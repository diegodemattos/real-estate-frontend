<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="deal-form">
  <div class="form-row">
    <app-form-input
      label="Deal Name"
      [required]="true"
      placeholder="e.g. Sunset Apartments"
      formControlName="dealName"
    />

    <app-form-input
      label="Address"
      [required]="true"
      placeholder="e.g. 123 Main St, City, State"
      formControlName="address"
    />
  </div>

  <div class="form-row">
    <app-form-input
      label="Purchase Price ($)"
      type="number"
      [required]="true"
      [min]="1"
      placeholder="e.g. 2500000"
      formControlName="purchasePrice"
    />

    <app-form-input
      label="Net Operating Income ($)"
      type="number"
      [required]="true"
      [min]="0"
      placeholder="e.g. 175000"
      formControlName="noi"
    />
  </div>

  @if (previewCapRate() !== null) {
    <div class="cap-rate-preview">
      <span class="cap-rate-preview__label">Estimated Cap Rate:</span>
      <span class="cap-rate-preview__value">
        {{ previewCapRate()! | percent: '1.2-2' }}
      </span>
    </div>
  }

  <div class="deal-form__actions">
    <button
      class="btn btn--outline"
      type="button"
      (click)="cancel()"
      [disabled]="isSaving()"
    >
      Cancel
    </button>
    <button
      class="btn btn--primary"
      type="submit"
      [disabled]="isSaving()"
      [class.btn--loading]="isSaving()"
    >
      @if (isSaving()) {
        <span class="btn__spinner" aria-hidden="true"></span>
        {{ isEditMode() ? 'Updating...' : 'Adding...' }}
      } @else {
        {{ isEditMode() ? 'Update Deal' : 'Add Deal' }}
      }
    </button>
  </div>
</form>
