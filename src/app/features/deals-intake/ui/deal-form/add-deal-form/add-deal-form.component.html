<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="deal-form">
  <div class="form-row">
    <app-form-input
      label="Deal Name"
      [required]="true"
      [autofocus]="true"
      placeholder="e.g. Sunset Apartments"
      formControlName="dealName"
      [errors]="{ required: 'Deal name is required.', whitespace: 'Deal name cannot be only spaces.' }"
    />

    <app-form-input
      label="Address"
      [required]="true"
      placeholder="e.g. 123 Main St, City, State"
      formControlName="address"
      [errors]="{ required: 'Address is required.', whitespace: 'Address cannot be only spaces.' }"
    />
  </div>

  <div class="form-row">
    <app-form-input
      label="Purchase Price ($)"
      type="number"
      [required]="true"
      [min]="1"
      placeholder="e.g. 2500000"
      formControlName="purchasePrice"
      [errors]="{ required: 'Purchase price is required.', min: 'Purchase price must be at least $1.' }"
    />

    <app-form-input
      label="Net Operating Income ($)"
      type="number"
      [required]="true"
      [min]="0"
      placeholder="e.g. 175000"
      formControlName="noi"
      [errors]="{ required: 'NOI is required.', min: 'NOI must be 0 or greater.' }"
    />
  </div>

  @if (previewCapRate() !== null) {
    <div class="cap-rate-preview">
      <span class="cap-rate-preview__label">Estimated Cap Rate:</span>
      <span class="cap-rate-preview__value">
        {{ previewCapRate()! | percent: '1.2-2' }}
      </span>
    </div>
  }

  <div class="deal-form__actions">
    <app-button
      variant="outline"
      [disabled]="isSaving()"
      (action)="cancel()"
    >
      Cancel
    </app-button>
    <app-button
      type="submit"
      variant="primary"
      [loading]="isSaving()"
      [disabled]="!isFormValid()"
      loadingLabel="Adding..."
    >
      Add Deal
    </app-button>
  </div>
</form>
