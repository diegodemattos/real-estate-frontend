<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="login-form">
  <app-form-input
    label="Email Address"
    type="email"
    [required]="true"
    autocomplete="email"
    formControlName="email"
  />

  <app-form-input
    label="Password"
    type="password"
    [required]="true"
    autocomplete="current-password"
    formControlName="password"
  />

  <a class="login-form__forgot" routerLink="/public/password-recovery">
    Forgot password?
  </a>

  @if (errorMessage()) {
    <div class="login-form__error" role="alert">
      {{ errorMessage() }}
    </div>
  }

  <button
    class="btn btn--primary"
    type="submit"
    [disabled]="isLoading()"
    [class.btn--loading]="isLoading()"
  >
    @if (isLoading()) {
      <span class="btn__spinner" aria-hidden="true"></span>
      Signing in...
    } @else {
      Sign In
    }
  </button>
</form>
