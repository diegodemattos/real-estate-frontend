<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="login-form">
  <app-form-input
    label="Email Address"
    type="email"
    [required]="true"
    autocomplete="email"
    formControlName="email"
    [errors]="{ required: 'Email is required.', email: 'Enter a valid email address.' }"
  />

  <app-form-input
    label="Password"
    type="password"
    [required]="true"
    autocomplete="current-password"
    formControlName="password"
    [errors]="{ required: 'Password is required.' }"
  />

  <div class="login-form__forgot">
    <app-link to="/public/password-recovery">Forgot password?</app-link>
  </div>

  @if (errorMessage()) {
    <app-alert variant="error">{{ errorMessage() }}</app-alert>
  }

  <app-button
    type="submit"
    variant="primary"
    [full]="true"
    [loading]="isLoading()"
    loadingLabel="Signing in..."
  >
    Sign In
  </app-button>
</form>
