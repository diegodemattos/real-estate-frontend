<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="recovery-form">
  <app-form-input
    label="Email Address"
    type="email"
    [required]="true"
    autocomplete="email"
    formControlName="email"
  />

  @if (errorMessage()) {
    <div class="recovery-form__error" role="alert">
      {{ errorMessage() }}
    </div>
  }

  <button
    class="btn btn--primary"
    type="submit"
    [disabled]="isLoading()"
    [class.btn--loading]="isLoading()"
  >
    @if (isLoading()) {
      <span class="btn__spinner" aria-hidden="true"></span>
      Sending...
    } @else {
      Send temporary password
    }
  </button>
</form>
