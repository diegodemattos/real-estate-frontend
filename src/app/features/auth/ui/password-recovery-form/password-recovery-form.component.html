<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="recovery-form">
  <div class="field">
    <label class="field__label" for="recovery-email">
      Email Address <span class="field__required" aria-hidden="true">*</span>
    </label>
    <input
      id="recovery-email"
      class="field__input"
      [class.field__input--error]="isFieldInvalid('email')"
      type="email"
      formControlName="email"
      autocomplete="email"
    />
    @if (isFieldInvalid('email')) {
      @if (form.get('email')?.errors?.['required']) {
        <span class="field__error" role="alert">Email is required.</span>
      } @else if (form.get('email')?.errors?.['email']) {
        <span class="field__error" role="alert">
          Please enter a valid email.
        </span>
      }
    }
  </div>

  @if (errorMessage()) {
    <div class="recovery-form__error" role="alert">
      {{ errorMessage() }}
    </div>
  }

  <button
    class="btn btn--primary"
    type="submit"
    [disabled]="isLoading()"
    [class.btn--loading]="isLoading()"
  >
    @if (isLoading()) {
      <span class="btn__spinner" aria-hidden="true"></span>
      Sending...
    } @else {
      Send temporary password
    }
  </button>
</form>
