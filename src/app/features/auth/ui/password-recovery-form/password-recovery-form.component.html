<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="recovery-form">
  <app-form-input
    label="Email Address"
    type="email"
    [required]="true"
    autocomplete="email"
    formControlName="email"
    [errors]="{ required: 'Email is required.', email: 'Enter a valid email address.' }"
  />

  @if (errorMessage()) {
    <app-alert variant="error">{{ errorMessage() }}</app-alert>
  }

  <app-button
    type="submit"
    variant="primary"
    [full]="true"
    [loading]="isLoading()"
    [disabled]="!isFormValid()"
    loadingLabel="Sending..."
  >
    Send temporary password
  </app-button>
</form>
