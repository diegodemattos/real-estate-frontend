<div class="recovery-card">
  <h1 class="recovery-card__title">Reset password</h1>
  <p class="recovery-card__subtitle">
    Enter the email associated with your account and we'll send you a
    temporary password.
  </p>

  @if (isSuccess()) {
    <app-alert variant="success">
      If this email is registered, a temporary password will be sent to it
      shortly.
    </app-alert>
  }

  <app-password-recovery-form
    [errorMessage]="errorMessage()"
    [isLoading]="isLoading()"
    (recover)="onRecover($event)"
  />

  <div class="recovery-card__link">
    <app-link to="/public/login">Back to sign in</app-link>
  </div>
</div>
