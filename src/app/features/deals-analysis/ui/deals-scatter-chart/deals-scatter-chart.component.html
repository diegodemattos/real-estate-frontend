@if (chartData(); as chart) {
  <!-- Color legend -->
  <div class="color-legend">
    @for (range of capRateRanges; track range.label) {
      <span class="color-legend__item">
        <span class="color-legend__dot" [style.background-color]="range.color"></span>
        {{ range.label }}
      </span>
    }
  </div>

  <svg
    class="chart"
    [attr.viewBox]="'0 0 ' + width + ' ' + height"
    preserveAspectRatio="xMidYMid meet"
  >
    <!-- Grid lines -->
    @for (y of chart.gridYPositions; track y) {
      <line
        class="chart__grid"
        [attr.x1]="pad.left"
        [attr.y1]="y"
        [attr.x2]="width - pad.right"
        [attr.y2]="y"
      />
    }
    @for (x of chart.gridXPositions; track x) {
      <line
        class="chart__grid"
        [attr.x1]="x"
        [attr.y1]="pad.top"
        [attr.x2]="x"
        [attr.y2]="height - pad.bottom"
      />
    }

    <!-- Axes -->
    <line
      class="chart__axis"
      [attr.x1]="pad.left"
      [attr.y1]="height - pad.bottom"
      [attr.x2]="width - pad.right"
      [attr.y2]="height - pad.bottom"
    />
    <line
      class="chart__axis"
      [attr.x1]="pad.left"
      [attr.y1]="pad.top"
      [attr.x2]="pad.left"
      [attr.y2]="height - pad.bottom"
    />

    <!-- X axis ticks + labels -->
    @for (tick of chart.xTicks; track tick.label) {
      <text
        class="chart__tick"
        [attr.x]="tick.position"
        [attr.y]="height - pad.bottom + 20"
        text-anchor="middle"
      >
        {{ tick.label }}
      </text>
    }

    <!-- Y axis ticks + labels -->
    @for (tick of chart.yTicks; track tick.label) {
      <text
        class="chart__tick"
        [attr.x]="pad.left - 10"
        [attr.y]="tick.position + 4"
        text-anchor="end"
      >
        {{ tick.label }}
      </text>
    }

    <!-- Axis titles -->
    <text
      class="chart__axis-title"
      [attr.x]="pad.left + (width - pad.left - pad.right) / 2"
      [attr.y]="height - 8"
      text-anchor="middle"
    >
      Purchase Price
    </text>
    <text
      class="chart__axis-title"
      text-anchor="middle"
      [attr.transform]="'translate(18,' + (pad.top + (height - pad.top - pad.bottom) / 2) + ') rotate(-90)'"
    >
      Cap Rate
    </text>

    <!-- Data points with number labels -->
    @for (point of chart.points; track point.label) {
      <circle
        class="chart__point"
        [attr.cx]="point.cx"
        [attr.cy]="point.cy"
        r="10"
        [attr.fill]="point.color"
      >
        <title>{{ point.tooltip }}</title>
      </circle>
      <text
        class="chart__point-label"
        [attr.x]="point.cx"
        [attr.y]="point.cy + 4"
        text-anchor="middle"
      >
        {{ point.label }}
      </text>
    }
  </svg>

  <!-- Reference table -->
  <div class="legend-table-wrapper">
    <table class="legend-table">
      <thead>
        <tr>
          <th class="legend-table__th legend-table__th--num">#</th>
          <th class="legend-table__th">Deal Name</th>
          <th class="legend-table__th legend-table__th--right">Price</th>
          <th class="legend-table__th legend-table__th--right">Cap Rate</th>
        </tr>
      </thead>
      <tbody>
        @for (item of chart.legendItems; track item.number) {
          <tr class="legend-table__row">
            <td class="legend-table__td legend-table__td--num" data-label="#">
              <span class="legend-table__dot" [style.background-color]="item.color"></span>
              {{ item.number }}
            </td>
            <td class="legend-table__td legend-table__td--name" data-label="Deal Name">{{ item.name }}</td>
            <td class="legend-table__td legend-table__td--right" data-label="Price">{{ item.price }}</td>
            <td class="legend-table__td legend-table__td--right" data-label="Cap Rate">{{ item.capRate }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
