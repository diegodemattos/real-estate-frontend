<header class="header">
  <div class="header__inner">
    <div class="header__brand">
      <button
        class="header__toggle"
        type="button"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="main-menu"
        aria-label="Toggle navigation menu"
        (click)="onToggleMenu()"
      >
        <span class="header__toggle-icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <img
        src="assets/images/logo.png"
        alt="TermSheet logo"
        class="header__logo"
      />
      <h1 class="header__title">TermSheet</h1>
    </div>

    <div class="header__user">
      @if (user(); as u) {
        <span class="header__username">{{ u.email }}</span>
      }
      <app-button variant="ghost" (action)="onLogout()">Sign Out</app-button>
    </div>
  </div>
</header>
