<div class="main-layout">
  <app-main-header
    [isMenuOpen]="isMenuOpen()"
    (menuToggle)="toggleMenu()"
  />

  <div class="main-layout__body">
    <app-main-menu [isOpen]="isMenuOpen()" />

    @if (isMenuOpen()) {
      <button
        type="button"
        class="main-layout__backdrop"
        aria-label="Close menu"
        (click)="closeMenu()"
      ></button>
    }

    <main class="main-layout__main">
      <router-outlet />
    </main>
  </div>

  <app-main-footer />
</div>
