<div class="form-input">
  @if (label()) {
    <label class="form-input__label" [attr.for]="inputId">
      {{ label() }}
      @if (required()) {
        <span class="form-input__required" aria-hidden="true">*</span>
      }
    </label>
  }

  <div class="form-input__control">
    <input
      [id]="inputId"
      class="form-input__input"
      [class.form-input__input--error]="shouldShowError"
      [class.form-input__input--password]="type() === 'password'"
      [type]="effectiveType()"
      [value]="value()"
      [placeholder]="placeholder()"
      [attr.autocomplete]="autocomplete() || null"
      [attr.min]="type() === 'number' ? min() : null"
      [attr.aria-label]="!label() && ariaLabel() ? ariaLabel() : null"
      [disabled]="disabled()"
      (input)="onInput($event)"
      (blur)="onBlur()"
    />

    @if (type() === 'password') {
      <button
        class="form-input__password-toggle"
        type="button"
        tabindex="-1"
        [attr.aria-label]="
          isPasswordVisible() ? 'Hide password' : 'Show password'
        "
        [attr.aria-pressed]="isPasswordVisible()"
        (click)="togglePassword()"
      >
        @if (isPasswordVisible()) {
            <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path
              d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.64 18.64 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
            />
            <path d="M1 1l22 22" />
            <path d="M9.5 9.5a3 3 0 0 0 4.24 4.24" />
          </svg>
        } @else {
          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        }
      </button>
    }
  </div>

  @if (errorText) {
    <span class="form-input__error" role="alert">{{ errorText }}</span>
  }
</div>
