@if (isOpen()) {
  <div class="modal-backdrop" role="presentation" (click)="onClose()">
    <div
      class="modal"
      role="dialog"
      aria-modal="true"
      [attr.aria-labelledby]="titleId"
      (click)="$event.stopPropagation()"
    >
      <div class="modal__header">
        <h2 class="modal__title" [id]="titleId">{{ title() }}</h2>
        <button
          class="modal__close"
          type="button"
          aria-label="Close"
          (click)="onClose()"
        >
          ✕
        </button>
      </div>
      <div class="modal__body">
        <ng-content />
      </div>
    </div>
  </div>
}
