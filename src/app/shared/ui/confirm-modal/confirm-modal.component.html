<app-modal [isOpen]="isOpen()" [title]="title()" (closed)="onCancel()">
  <div class="confirm">
    <p class="confirm__message">{{ message() }}</p>

    <div class="confirm__actions">
      <app-button
        variant="outline"
        [disabled]="isConfirming()"
        (action)="onCancel()"
      >
        {{ cancelLabel() }}
      </app-button>
      <app-button
        variant="danger"
        [loading]="isConfirming()"
        loadingLabel="Deleting..."
        (action)="onConfirm()"
      >
        {{ confirmLabel() }}
      </app-button>
    </div>
  </div>
</app-modal>
